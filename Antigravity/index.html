<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Antigravity Lernportal</title>
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>

<header>
  <div class="nav-inner">
    <a href="#" class="logo" onclick="event.preventDefault(); showSection('home')">
      <div class="logo-icon">🛰️</div>
      <div class="logo-text">Anti<span>gravity</span></div>
    </a>
    <nav id="main-nav"></nav>
    <div class="nav-actions">
      <select onchange="window.location.href=this.value" style="background:transparent; color:white; border:1px solid #334155; border-radius:8px; padding:0.4rem; font-size:0.8rem; cursor:pointer;">
        <option value="/Antigravity/index.html">🛰️ Antigravity</option>
        <option value="/index.html">🏠 Gemini CLI (Hauptseite)</option>
      </select>
      <a href="https://antigravity.google/docs" target="_blank" class="btn btn-outline">Docs</a>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div id="sidebar-inner"></div>
  </aside>

  <main class="main-content">
    <section id="hero" class="hero">
      <h1>Google Antigravity</h1>
      <p>Meistern Sie die nächste Generation des Agent-gestützten Codings. Von der Installation bis zur komplexen Workflow-Automatisierung – alles in einem Portal.</p>
      <div class="hero-actions">
        <button class="btn btn-primary" onclick="showSection('lernpfad')">Lernpfad starten</button>
        <button class="btn btn-outline" onclick="showSection('cli')">CLI Referenz</button>
      </div>
    </section>

    <div id="section-home" class="page-section"></div>
    <div id="section-lernpfad" class="page-section"></div>
    <div id="section-module" class="page-section"></div>
    <div id="section-kurse" class="page-section"></div>
    <div id="section-cli" class="page-section"></div>
    <div id="section-tutorials" class="page-section"></div>
    <div id="section-wiki" class="page-section"></div>
    <div id="section-editor" class="page-section"></div>
  </main>
</div>

<script src="./js/content-antigravity.js"></script>
<script src="./js/content-lernpfad.js"></script>
<script src="./js/content-cli.js"></script>
<script src="./js/content-kurse.js"></script>
<script src="./js/content-tutorials.js"></script>
<script src="./js/content-wiki.js"></script>
<script src="./js/main.js"></script>

</body>
</html>
